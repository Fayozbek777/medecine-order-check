<!-- ============================================================
     КОНТАКТЫ — ОБНОВЛЕННАЯ ВЕРСИЯ
     ============================================================ -->
<section class="contact">
  <div class="container">
    <div class="contact-grid">
      <!-- ЛЕВАЯ СТОРОНА — ИНФОРМАЦИЯ -->
      <div class="contact-info">
        <div class="section-header-left">
          <span class="section-badge">Контакты</span>
          <h2 class="section-title">
            Свяжитесь <span class="highlight">с нами</span>
          </h2>
        </div>

        <!-- Телефон -->
        <div class="contact-item">
          <div class="contact-icon"><i class="fas fa-phone"></i></div>
          <div>
            <h4>Телефон</h4>
            <a href="tel:+79772640811">+7 977 264-08-11</a>
          </div>
        </div>

        <!-- WhatsApp / Telegram -->
        <div class="contact-item">
          <div class="contact-icon"><i class="fab fa-whatsapp"></i></div>
          <div>
            <h4>WhatsApp / Telegram</h4>
            <a href="https://wa.me/79772640811">+7 977 264-08-11</a>
          </div>
        </div>

        <!-- Местоположение -->
        <div class="contact-item">
          <div class="contact-icon"><i class="fas fa-location-dot"></i></div>
          <div>
            <h4>Местоположение</h4>
            <p>Москва, Россия<br />Работаем по всей России</p>
          </div>
        </div>

        <!-- Соцсети -->
        <div class="contact-social">
          <span
            ><i
              class="fas fa-share-alt"
              style="margin-right: 8px; color: #0b6b8a"
            ></i
            >Связь с нами</span
          >
          <div class="social-links">
            <a href="#" aria-label="Telegram">
              <i class="fab fa-telegram-plane"></i>
            </a>
            <a href="#" aria-label="WhatsApp">
              <i class="fab fa-whatsapp"></i>
            </a>
            <a href="#" aria-label="Email">
              <i class="fas fa-envelope"></i>
            </a>
            <a href="#" aria-label="VK">
              <i class="fab fa-vk"></i>
            </a>
          </div>
        </div>
      </div>

      <!-- ПРАВАЯ СТОРОНА — ФОРМА -->
      <div class="contact-form-wrapper">
        <h3 class="form-title">Оставить заявку</h3>

        <form id="contactForm" novalidate>
          <!-- Имя -->
          <div class="form-group">
            <label for="userName">Ваше имя</label>
            <input
              type="text"
              id="userName"
              placeholder="Иван Петров"
              required
            />
            <span class="error-message">Введите ваше имя</span>
          </div>

          <!-- Телефон -->
          <div class="form-group">
            <label for="userPhone">Телефон</label>
            <input
              type="tel"
              id="userPhone"
              placeholder="+7 (999) 123-45-67"
              required
            />
            <span class="error-message">Введите корректный номер телефона</span>
          </div>

          <!-- Город -->
          <div class="form-group">
            <label for="userCity">Город</label>
            <input type="text" id="userCity" placeholder="Москва" />
          </div>

          <!-- Сообщение -->
          <div class="form-group">
            <label for="userMessage">Сообщение</label>
            <textarea
              id="userMessage"
              rows="4"
              placeholder="Опишите ваш груз"
            ></textarea>
          </div>

          <!-- Чекбокс -->
          <div class="form-group checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="userAgree" required />
              <span class="checkmark"></span>
              Я согласен с обработкой персональных данных и политикой
              конфиденциальности
            </label>
            <span class="error-message">Необходимо согласие</span>
          </div>

          <!-- Кнопка -->
          <button type="submit" class="btn btn-primary btn-full">
            <i class="fas fa-paper-plane"></i>
            Отправить заявку
          </button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon">
    <i class="fas fa-check-circle"></i>
  </div>
  <div class="toast-content">
    <div class="toast-title" id="toastTitle">Успешно!</div>
    <div class="toast-message" id="toastMessage">Ваша заявка отправлена</div>
  </div>
  <button class="toast-close" id="toastClose">&times;</button>
</div>
